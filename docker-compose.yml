version: '3.9'

services:
  rtsp-ws-bridge:
    container_name: ad-stream-bridge
    build:
      context: .
      dockerfile: Dockerfile
    image: ad-stream-bridge:local
    env_file:
      - .env
    ports:
      - '3000:3000'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
