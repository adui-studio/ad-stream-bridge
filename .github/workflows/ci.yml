name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: 代码校验
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行 lint
        run: pnpm lint

      - name: 运行 typecheck
        run: pnpm typecheck

      - name: 运行 test
        run: pnpm test

      - name: 运行 build
        run: pnpm build
